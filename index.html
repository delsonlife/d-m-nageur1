<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devis Toiture Gratuit | Couverture Paris Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 48px 32px;
            background: white;
            border-radius: 32px;
            max-width: 550px;
            margin: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        h1 {
            color: #ff6b00;
            margin-bottom: 16px;
            font-size: 1.9rem;
        }
        .subtitle {
            color: #1e293b;
            font-size: 1.1rem;
            margin-bottom: 12px;
        }
        p {
            color: #475569;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .info-box {
            background: #fff7ed;
            border-left: 4px solid #ff6b00;
            padding: 16px 20px;
            border-radius: 16px;
            margin-top: 20px;
            font-size: 14px;
            color: #78350f;
        }
        .emoji-big {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji-big">🏠</div>
        <h1>Couverture Paris Pro</h1>
        <div class="subtitle">Devis toiture <strong>gratuit & sans engagement</strong></div>
        <p>Réponse sous 24h • Artisans certifiés • Prix transparents</p>
        <div class="info-box">
            💡 <strong>Cliquez sur le bouton orange</strong> en bas à droite de l'écran<br>
            Répondez à quelques questions → Recevez votre estimation
        </div>
    </div>

    <!-- Widget de devis toiture -->
    <script src="https://toiture-one.vercel.app/widget.js?license=ABC123"></script>
</body>
</html>
