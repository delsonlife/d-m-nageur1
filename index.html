<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couverture Paris Pro - Devis Toiture Gratuit</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

       <style>
  /* Styles du widget toiture */
  .widget-typeform {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    max-width: 680px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 32px;
    min-height: 500px;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .widget-progress {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: #e2e8f0;
    border-radius: 2px;
    overflow: hidden;
  }
  .widget-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff6b00, #e55a00);
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .widget-step-counter {
    text-align: center;
    padding: 24px 24px 0;
    font-size: 13px;
    font-weight: 500;
    color: #64748b;
    letter-spacing: 0.5px;
  }
  .widget-content {
    padding: 48px 32px 32px;
    min-height: 420px;
    display: flex;
    flex-direction: column;
  }
  .widget-question {
    font-size: 32px;
    font-weight: 600;
    color: #1a1a2e;
    line-height: 1.2;
    margin-bottom: 40px;
    font-family: 'Cormorant Garamond', serif;
  }
  .widget-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }
  .widget-option {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    background: #f8fafc;
    border: 2px solid #e2e8f0;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .widget-option.selected {
    border-color: #ff6b00;
    background: #fff7ed;
  }
  .widget-option-icon {
    font-size: 28px;
  }
  .widget-option-text {
    flex: 1;
  }
  .widget-option-title {
    font-weight: 600;
    font-size: 16px;
    color: #1a1a2e;
    margin-bottom: 4px;
  }
  .widget-navigation {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #e2e8f0;
  }
  .widget-btn {
    padding: 14px 28px;
    border-radius: 40px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .widget-btn-prev {
    background: transparent;
    color: #64748b;
  }
  .widget-btn-next, .widget-btn-submit {
    background: linear-gradient(135deg, #ff6b00, #e55a00);
    color: white;
    box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
  }
  /* Ajoutez d'autres styles si nécessaire */
</style>
    
    <link rel="stylesheet" href="/widget.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Devis toiture <span>gratuit</span></h1>
            <p>Estimation précise en moins de 2 minutes • Réponse sous 24h</p>
            <div class="trust-badge">
                <span>✅ Artisan certifié RGE</span>
                <span>🛡️ Garantie décennale</span>
                <span>⭐ 4.9/5 (156 avis)</span>
            </div>
        </div>
        
        <div id="roof-widget-container"></div>
        
        <div class="footer">
            <p>© 2026 Couverture Paris Pro - Devis gratuit sans engagement</p>
        </div>
    </div>
         <script src="https://roof-widget.vercel.app/widget.js"></script>
        <link rel="stylesheet" href="https://roof-widget.vercel.app/public/widget.css">
<script src="https://roof-widget.vercel.app/public/widget.js"></script>
</body>
</html>
