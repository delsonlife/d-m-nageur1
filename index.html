<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couverture Paris Pro - Devis Toiture Gratuit</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .header h1 span {
            color: #ff6b00;
        }
        
        .header p {
            color: #64748b;
            font-size: 16px;
        }
        
        .trust-badge {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        
        .trust-badge span {
            font-size: 13px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 24px;
            color: #94a3b8;
            font-size: 12px;
        }
        
        /* ========== STYLES COMPLETS DU WIDGET ========== */
        .widget-typeform {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 680px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            min-height: 500px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .widget-progress {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .widget-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b00, #e55a00);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .widget-step-counter {
            text-align: center;
            padding: 24px 24px 0;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            letter-spacing: 0.5px;
        }
        
        .widget-content {
            padding: 48px 32px 32px;
            min-height: 420px;
            display: flex;
            flex-direction: column;
        }
        
        .widget-question {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a2e;
            line-height: 1.2;
            margin-bottom: 40px;
            font-family: 'Cormorant Garamond', serif;
            text-align: left;
        }
        
        .widget-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .widget-option {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .widget-option:hover {
            transform: translateX(4px);
        }
        
        .widget-option.selected {
            border-color: #ff6b00;
            background: #fff7ed;
        }
        
        .widget-option-icon {
            font-size: 28px;
        }
        
        .widget-option-text {
            flex: 1;
        }
        
        .widget-option-title {
            font-weight: 600;
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        
        .widget-option-desc {
            font-size: 13px;
            color: #64748b;
        }
        
        /* Slider */
        .widget-slider-container {
            margin-bottom: 32px;
        }
        
        .widget-slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-weight: 500;
            color: #1a1a2e;
        }
        
        .widget-slider-value {
            font-size: 36px;
            font-weight: 700;
            color: #ff6b00;
            text-align: center;
            margin-top: 20px;
        }
        
        .widget-slider-unit {
            font-size: 16px;
            font-weight: 400;
            color: #64748b;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: #e2e8f0;
            border-radius: 3px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #ff6b00;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(255, 107, 0, 0.3);
        }
        
        /* Checkbox / Multiselect */
        .widget-checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .widget-checkbox {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 24px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .widget-checkbox.selected {
            border-color: #ff6b00;
            background: #fff7ed;
        }
        
        .widget-checkbox-icon {
            font-size: 28px;
        }
        
        .widget-checkbox-label {
            flex: 1;
            font-weight: 500;
            font-size: 16px;
            color: #1a1a2e;
        }
        
        .widget-checkbox-price {
            font-size: 14px;
            color: #ff6b00;
            font-weight: 600;
        }
        
        .widget-checkbox input {
            width: 22px;
            height: 22px;
            accent-color: #ff6b00;
            cursor: pointer;
        }
        
        /* Input */
        .widget-input-group {
            margin-bottom: 32px;
        }
        
        .widget-input {
            width: 100%;
            padding: 18px 20px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            outline: none;
            transition: all 0.2s;
            background: #f8fafc;
        }
        
        .widget-input:focus {
            border-color: #ff6b00;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1);
        }
        
        /* Quantity */
        .widget-quantity {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 12px;
            padding-left: 56px;
        }
        
        .widget-quantity-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #e2e8f0;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .widget-quantity-btn:hover {
            background: #ff6b00;
            color: white;
        }
        
        .widget-quantity-value {
            font-size: 18px;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }
        
        /* Navigation */
        .widget-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .widget-btn {
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .widget-btn-prev {
            background: transparent;
            color: #64748b;
        }
        
        .widget-btn-prev:hover {
            color: #1a1a2e;
            background: #f8fafc;
        }
        
        .widget-btn-next, .widget-btn-submit {
            background: linear-gradient(135deg, #ff6b00, #e55a00);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
        }
        
        .widget-btn-next:hover, .widget-btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 0, 0.4);
        }
        
        /* Resultat */
        .widget-result-price {
            background: linear-gradient(135deg, #fff7ed, #f8fafc);
            border-radius: 32px;
            padding: 32px;
            margin: 24px 0;
            text-align: center;
        }
        
        .widget-result-amount {
            font-size: 48px;
            font-weight: 800;
            color: #ff6b00;
            margin: 16px 0;
        }
        
        .widget-result-range {
            font-size: 18px;
            color: #64748b;
        }
        
        .widget-result-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            margin: 8px;
        }
        
        .widget-result-badge.complexity-faible { background: #dcfce7; color: #15803d; }
        .widget-result-badge.complexity-moyenne { background: #fef3c7; color: #92400e; }
        .widget-result-badge.complexity-elevee { background: #fee2e2; color: #b91c1c; }
        
        .widget-result-days {
            font-size: 14px;
            color: #64748b;
            margin-top: 16px;
            text-align: center;
        }
        
        /* Formulaire lead */
        .widget-form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .widget-form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1a1a2e;
        }
        
        /* Success */
        .widget-success {
            text-align: center;
            padding: 48px 24px;
        }
        
        .widget-success-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        
        .widget-success-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .widget-success-message {
            color: #64748b;
            line-height: 1.6;
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 20px 12px;
            }
            .header h1 {
                font-size: 32px;
            }
            .trust-badge {
                gap: 12px;
            }
            .trust-badge span {
                font-size: 11px;
            }
            .widget-typeform {
                border-radius: 0;
                min-height: 100vh;
            }
            .widget-content {
                padding: 32px 20px 24px;
            }
            .widget-question {
                font-size: 26px;
                margin-bottom: 28px;
            }
            .widget-option {
                padding: 16px 20px;
            }
            .widget-result-amount {
                font-size: 36px;
            }
            .widget-btn {
                padding: 12px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Devis toiture <span>gratuit</span></h1>
            <p>Estimation précise en moins de 2 minutes</p>
            <div class="trust-badge">
                <span>✅ Artisan certifié RGE</span>
                <span>🛡️ Garantie décennale</span>
                <span>⭐ 4.9/5 (156 avis)</span>
            </div>
        </div>
        
        <div id="roof-widget-container"></div>
        
        <div class="footer">
            <p>© 2026 Couverture Paris Pro - Devis gratuit sans engagement</p>
        </div>
    </div>
    
    <!-- UN SEUL SCRIPT SUFFIT -->
    <script src="https://roof-widget.vercel.app/widget.js?license=DMP2024"></script>

    <script src="https://devisbox.vercel.app/widget.js?license=ABC123"></script>
  
    
</body>
</html>
