<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couverture Paris Pro - Devis Toiture Gratuit</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .header h1 span {
            color: #ff6b00;
        }
        
        .header p {
            color: #64748b;
            font-size: 16px;
        }
        
        .trust-badge {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        
        .trust-badge span {
            font-size: 13px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 24px;
            color: #94a3b8;
            font-size: 12px;
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 20px 12px;
            }
            .header h1 {
                font-size: 32px;
            }
            .trust-badge {
                gap: 12px;
            }
            .trust-badge span {
                font-size: 11px;
            }
        }
    </style>
    <link rel="stylesheet" href="/widget.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Devis toiture <span>gratuit</span></h1>
            <p>Estimation précise en moins de 2 minutes • Réponse sous 24h</p>
            <div class="trust-badge">
                <span>✅ Artisan certifié RGE</span>
                <span>🛡️ Garantie décennale</span>
                <span>⭐ 4.9/5 (156 avis)</span>
            </div>
        </div>
        
        <div id="roof-widget-container"></div>
        
        <div class="footer">
            <p>© 2026 Couverture Paris Pro - Devis gratuit sans engagement</p>
        </div>
    </div>
    
    <script src="/widget.js"></script>
</body>
</html>
