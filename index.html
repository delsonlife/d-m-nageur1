<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Widget</title>
    <style>
        body { font-family: system-ui; padding: 50px; text-align: center; }
        #debug { margin-top: 30px; padding: 20px; background: #f0f0f0; border-radius: 10px; text-align: left; font-family: monospace; font-size: 12px; }
        button { padding: 12px 24px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Test Widget Toiture</h1>
    <button onclick="window.RoofWidget?.open?.()">Ouvrir manuellement</button>
    <div id="debug"></div>

    <script>
        // Interception des erreurs
        window.onerror = function(msg, url, line) {
            document.getElementById('debug').innerHTML += `<div>❌ Erreur: ${msg} (ligne ${line})</div>`;
        };
        
        // Vérifier si le widget charge
        console.log("Chargement du widget...");
        const script = document.createElement('script');
        script.src = "https://toiture-one.vercel.app/widget.js?license=ABC123";
        script.onload = () => {
            document.getElementById('debug').innerHTML += '<div>✅ Widget chargé</div>';
            document.getElementById('debug').innerHTML += '<div>📦 Objets disponibles: ' + Object.keys(window).filter(k => k.toLowerCase().includes('roof') || k.toLowerCase().includes('widget')).join(', ') || 'aucun' + '</div>';
        };
        script.onerror = () => {
            document.getElementById('debug').innerHTML += '<div>❌ Impossible de charger widget.js</div>';
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
