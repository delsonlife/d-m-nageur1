<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Toiture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; 
            background: #f5f7fb; 
            min-height: 100vh;
        }
        /* Essayons plusieurs IDs courants que le widget pourrait chercher */
        #widget, #roof-widget, #toiture-widget, .widget-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <!-- Ajout de plusieurs conteneurs possibles (le widget cherche sûrement l'un d'eux) -->
    <div id="widget"></div>
    <div id="roof-widget"></div>
    <div id="toiture-widget"></div>
    <div class="widget-container"></div>
    <div id="root"></div>
    
    <script src="https://toiture-one.vercel.app/widget.js?license=ABC123"></script>
</body>
</html>
