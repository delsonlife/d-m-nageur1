<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Toiture</title>
    <style>
        body { font-family: system-ui; padding: 20px; background: #f0f2f5; }
        #widget-container { min-height: 200px; }
    </style>
</head>
<body>
    <div id="widget-container"></div>
    
    <script src="https://toiture-one.vercel.app/widget.js?license=ABC123"></script>
    
    <script>
        // Si le widget expose une fonction d'initialisation, on essaye de l'appeler
        window.addEventListener('load', function() {
            if (typeof window.initWidget === 'function') {
                window.initWidget({ container: '#widget-container' });
            } else if (typeof window.startWidget === 'function') {
                window.startWidget();
            }
            console.log('Script chargé, variables globales :', Object.keys(window).filter(k => k.toLowerCase().includes('widget')));
        });
    </script>
</body>
</html>
